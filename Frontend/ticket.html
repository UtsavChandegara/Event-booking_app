<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Secure Tickets - Eventify</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .tickets-wrap {
            display: grid;
            gap: 16px;
            margin-top: 20px;
        }
        .ticket-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background: #fff;
            padding: 16px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
        }
        .ticket-meta {
            display: grid;
            gap: 6px;
            margin-bottom: 10px;
        }
        .qr-box {
            width: 260px;
            height: 260px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .ticket-status {
            margin-top: 10px;
            font-weight: 600;
        }
        .ticket-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .entry-confirmation-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .entry-confirmation-card {
            width: min(460px, 92vw);
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">Eventify</a>
            <nav>
                <ul id="nav-links"></ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="events-list">
            <div class="container">
                <h1>My Secure Tickets</h1>
                <p>Each ticket has one QR code. It can be used only once at entry.</p>
                <div id="tickets-container" class="tickets-wrap">
                    <p>Loading tickets...</p>
                </div>
            </div>
        </section>
    </main>

    <div id="entry-confirmation-modal" class="entry-confirmation-modal" aria-hidden="true">
        <div class="entry-confirmation-card">
            <h2 style="margin-top: 0;">Entry Confirmed</h2>
            <p>Your ticket was verified successfully.</p>
            <div id="entry-confirmation-details" style="margin: 12px 0;"></div>
            <div class="ticket-actions">
                <a id="entry-card-link" class="btn btn-secondary" href="experience-cards.html?view=unlocked">Open Experience Card</a>
                <button id="entry-confirmation-close" class="btn btn-primary">OK</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/nav.js"></script>
    <script type="module">
        import api from "./js/api.js";

        const token = localStorage.getItem("token");
        const user = JSON.parse(localStorage.getItem("user") || "null");

        if (!token || !user) {
            window.location.href = "login.html";
        }

        const ticketsContainer = document.getElementById("tickets-container");
        const bookingId = new URLSearchParams(window.location.search).get("bookingId");
        const entryConfirmationModal = document.getElementById("entry-confirmation-modal");
        const entryConfirmationDetails = document.getElementById("entry-confirmation-details");
        const entryCardLink = document.getElementById("entry-card-link");
        const entryConfirmationClose = document.getElementById("entry-confirmation-close");
        const statusByTicketId = new Map();
        let ticketsPollInterval = null;
        let hasShownEntryConfirmation = false;

        const buildTicketCard = (ticket) => {
            const actionHtml = ticket.status === "USED"
                ? `<div class="ticket-actions">
                        <a class="btn btn-secondary" href="experience-cards.html?bookingId=${encodeURIComponent(ticket.booking?._id || bookingId || "")}&view=unlocked">Open Experience Card</a>
                   </div>`
                : "";

            return `
                <div class="ticket-card" id="ticket-${ticket._id}">
                    <div class="ticket-meta">
                        <div><strong>Ticket:</strong> ${ticket.ticketNumber}</div>
                        <div><strong>Event:</strong> ${ticket.event?.title || "Event"}</div>
                        <div><strong>Date:</strong> ${ticket.event?.date ? new Date(ticket.event.date).toLocaleString() : "-"}</div>
                        <div><strong>Location:</strong> ${ticket.event?.location || "-"}</div>
                    </div>
                    <div class="qr-box" id="qr-${ticket._id}"></div>
                    <div class="ticket-status" id="status-${ticket._id}">Status: ${ticket.status}</div>
                    ${actionHtml}
                </div>
            `;
        };

        const showEntryConfirmationPopup = (ticket) => {
            if (hasShownEntryConfirmation || ticket.status !== "USED") return;

            const targetBookingId = ticket.booking?._id || bookingId || "";
            entryConfirmationDetails.innerHTML = `
                <div><strong>Ticket:</strong> ${ticket.ticketNumber}</div>
                <div><strong>Event:</strong> ${ticket.event?.title || "Event"}</div>
                <div><strong>Status:</strong> Verified at entry</div>
            `;
            entryCardLink.href = targetBookingId
                ? `experience-cards.html?bookingId=${encodeURIComponent(targetBookingId)}&view=unlocked`
                : "experience-cards.html?view=unlocked";
            entryConfirmationModal.style.display = "flex";
            entryConfirmationModal.setAttribute("aria-hidden", "false");
            hasShownEntryConfirmation = true;
        };

        const closeEntryConfirmationPopup = () => {
            entryConfirmationModal.style.display = "none";
            entryConfirmationModal.setAttribute("aria-hidden", "true");
        };

        const renderQr = (containerId, tokenValue) => {
            const box = document.getElementById(containerId);
            if (!box) return;
            box.innerHTML = "";
            new QRCode(box, {
                text: tokenValue,
                width: 240,
                height: 240,
                correctLevel: QRCode.CorrectLevel.M,
            });
        };

        const loadTicketQr = async (ticketId) => {
            try {
                const data = await api.getDynamicQr(ticketId, token);
                renderQr(`qr-${ticketId}`, data.qrToken);

                const statusEl = document.getElementById(`status-${ticketId}`);
                if (statusEl) statusEl.textContent = `Status: ${data.status}`;
            } catch (error) {
                const statusEl = document.getElementById(`status-${ticketId}`);
                if (statusEl) statusEl.textContent = `Status: ${error.message}`;
            }
        };

        const updateTicketCard = (ticket) => {
            const ticketCard = document.getElementById(`ticket-${ticket._id}`);
            if (!ticketCard) return;

            const statusEl = document.getElementById(`status-${ticket._id}`);
            if (statusEl) {
                statusEl.textContent = `Status: ${ticket.status}`;
            }

            let actionWrap = ticketCard.querySelector(".ticket-actions");
            if (ticket.status === "USED") {
                const targetBookingId = ticket.booking?._id || bookingId || "";
                const cardHref = targetBookingId
                    ? `experience-cards.html?bookingId=${encodeURIComponent(targetBookingId)}&view=unlocked`
                    : "experience-cards.html?view=unlocked";

                if (!actionWrap) {
                    actionWrap = document.createElement("div");
                    actionWrap.className = "ticket-actions";
                    ticketCard.appendChild(actionWrap);
                }

                actionWrap.innerHTML = `<a class="btn btn-secondary" href="${cardHref}">Open Experience Card</a>`;
            } else if (actionWrap) {
                actionWrap.remove();
            }
        };

        const syncTicketsState = (tickets) => {
            tickets.forEach((ticket) => {
                const previousStatus = statusByTicketId.get(ticket._id);
                statusByTicketId.set(ticket._id, ticket.status);

                updateTicketCard(ticket);

                if (ticket.status === "ACTIVE") {
                    loadTicketQr(ticket._id);
                } else {
                    const qrBox = document.getElementById(`qr-${ticket._id}`);
                    if (qrBox) qrBox.innerHTML = "";
                }

                if (ticket.status === "USED" && previousStatus && previousStatus !== "USED") {
                    showEntryConfirmationPopup(ticket);
                } else if (ticket.status === "USED" && !previousStatus) {
                    showEntryConfirmationPopup(ticket);
                }
            });
        };

        const fetchAndSyncTickets = async () => {
            const tickets = await api.getMyTickets(token, bookingId || "");

            if (!tickets.length) {
                ticketsContainer.innerHTML = "<p>No tickets found for this booking.</p>";
                return [];
            }

            if (!document.getElementById(`ticket-${tickets[0]._id}`)) {
                ticketsContainer.innerHTML = tickets.map(buildTicketCard).join("");
            }

            syncTicketsState(tickets);
            return tickets;
        };

        const init = async () => {
            try {
                await fetchAndSyncTickets();
                ticketsPollInterval = window.setInterval(async () => {
                    try {
                        await fetchAndSyncTickets();
                    } catch (error) {
                        console.error("Ticket status polling failed:", error);
                    }
                }, 4000);
            } catch (error) {
                ticketsContainer.innerHTML = `<p>${error.message}</p>`;
            }
        };

        entryConfirmationClose.addEventListener("click", closeEntryConfirmationPopup);
        entryConfirmationModal.addEventListener("click", (event) => {
            if (event.target === entryConfirmationModal) {
                closeEntryConfirmationPopup();
            }
        });

        window.addEventListener("beforeunload", () => {
            if (ticketsPollInterval) {
                window.clearInterval(ticketsPollInterval);
            }
        });

        init();
    </script>
</body>
</html>
