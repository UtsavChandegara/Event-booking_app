<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event - Eventify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        .hybrid-input {
            position: relative;
        }

        .hybrid-input .manual-input {
            padding-right: 72px;
        }

        .hybrid-input .picker-trigger {
            position: absolute;
            top: 6px;
            right: 6px;
            height: calc(100% - 12px);
            padding: 0 12px;
            border: 0;
            border-radius: 8px;
            background: rgba(99, 102, 241, 0.2);
            color: #c7d2fe;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            z-index: 2;
        }

        .hybrid-input .picker-trigger:hover {
            background: rgba(99, 102, 241, 0.35);
        }

        .hybrid-input .native-picker-overlay {
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .hybrid-input:focus-within .manual-input {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">Eventify</a>
            <nav>
                <ul id="nav-links"><!-- Links will be injected by script --></ul>
            </nav>
        </div>
    </header>

    <div class="container" style="max-width: 700px;">
        <h1>Edit Event</h1>
        <form id="editEventForm" enctype="multipart/form-data" class="card">
            <div class="form-group">
                <label for="title">Event Title</label>
                <input type="text" id="title" name="title" required>
            </div>
            
            <div class="form-group">
                <label for="eventDateText">Event Date (DD-MM-YYYY)</label>
                <div class="hybrid-input">
                    <input type="text" id="eventDateText" class="manual-input" placeholder="DD-MM-YYYY" required>
                    <button type="button" class="picker-trigger" id="eventDatePickBtn">Pick</button>
                    <input type="date" id="eventDatePicker" class="native-picker-overlay" tabindex="-1" aria-label="Choose event date">
                </div>
            </div>

            <div class="form-group">
                <label for="eventTimeText">Event Time (HH:mm)</label>
                <div class="hybrid-input">
                    <input type="text" id="eventTimeText" class="manual-input" placeholder="HH:mm" required>
                    <button type="button" class="picker-trigger" id="eventTimePickBtn">Pick</button>
                    <input type="time" id="eventTimePicker" class="native-picker-overlay" tabindex="-1" aria-label="Choose event time">
                </div>
                <input type="hidden" id="date" name="date" required>
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" required>
                <div id="map" style="height: 300px; margin-top: 10px; border-radius: 5px;"></div>
            </div>

            <div class="form-group">
                <label for="price">Ticket Price (₹)</label>
                <input type="number" id="price" name="price" min="0" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="totalTickets">Total Tickets Available</label>
                <input type="number" id="totalTickets" name="totalTickets" min="1" required>
            </div>

            <div class="form-group">
                <label>Event Image (Upload new to replace)</label>
                <input type="file" id="image" name="image" accept="image/*">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="5" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary submit-btn">Update Event</button>
        </form>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <div style="font-size: 50px; margin-bottom: 10px;">✅</div>
            <h3>Success!</h3>
            <p>Event updated successfully.</p>
            <button id="modalOkBtn" class="btn btn-primary">Okay</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="js/nav.js"></script>
    <script>
        const BASE_URL = 'http://127.0.0.1:3000/api';
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get('id');
        const eventDateText = document.getElementById('eventDateText');
        const eventDatePicker = document.getElementById('eventDatePicker');
        const eventDatePickBtn = document.getElementById('eventDatePickBtn');
        const eventTimeText = document.getElementById('eventTimeText');
        const eventTimePicker = document.getElementById('eventTimePicker');
        const eventTimePickBtn = document.getElementById('eventTimePickBtn');

        function formatDisplayDate(isoDate) {
            const [year, month, day] = isoDate.split('-');
            return `${day}-${month}-${year}`;
        }

        function parseDisplayDate(displayDate) {
            const match = displayDate.match(/^(\d{2})-(\d{2})-(\d{4})$/);
            if (!match) return null;

            const day = Number(match[1]);
            const month = Number(match[2]);
            const year = Number(match[3]);
            const date = new Date(year, month - 1, day);

            if (
                date.getFullYear() !== year ||
                date.getMonth() !== month - 1 ||
                date.getDate() !== day
            ) {
                return null;
            }

            const isoMonth = String(month).padStart(2, '0');
            const isoDay = String(day).padStart(2, '0');
            return `${year}-${isoMonth}-${isoDay}`;
        }

        function parseDisplayTime(displayTime) {
            const match = displayTime.match(/^([01]\d|2[0-3]):([0-5]\d)$/);
            if (!match) return null;
            return `${match[1]}:${match[2]}`;
        }

        function openPicker(input) {
            input.focus({ preventScroll: true });
            if (typeof input.showPicker === 'function') {
                try {
                    input.showPicker();
                    return;
                } catch (err) {
                    // Fallback for browsers that block showPicker in edge cases.
                }
            }
            try {
                input.click();
            } catch (err) {
                // Manual typing remains available if native picker can't be triggered.
            }
        }

        eventDatePickBtn.addEventListener('click', () => openPicker(eventDatePicker));
        eventTimePickBtn.addEventListener('click', () => openPicker(eventTimePicker));

        eventDatePicker.addEventListener('input', () => {
            if (eventDatePicker.value) {
                eventDateText.value = formatDisplayDate(eventDatePicker.value);
            }
        });

        eventTimePicker.addEventListener('input', () => {
            if (eventTimePicker.value) {
                eventTimeText.value = eventTimePicker.value;
            }
        });

        eventDateText.addEventListener('change', () => {
            const isoDate = parseDisplayDate(eventDateText.value.trim());
            eventDatePicker.value = isoDate || '';
        });

        eventTimeText.addEventListener('change', () => {
            const time = parseDisplayTime(eventTimeText.value.trim());
            eventTimePicker.value = time || '';
        });

        // Initialize Map
        const map = L.map('map').setView([51.505, -0.09], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let marker;
        map.on('click', async (e) => {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
                const data = await response.json();
                if (data.display_name) document.getElementById('location').value = data.display_name;
            } catch (err) { console.error(err); }
        });

        // Load Event Data
        document.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user'));

            if (!token || !user) {
                window.location.href = 'login.html';
                return;
            }

            if (!eventId) {
                alert('No event ID provided');
                window.location.href = 'dashboard.html';
                return;
            }

            try {
                const response = await fetch(`${BASE_URL}/events/${eventId}`);
                if (!response.ok) throw new Error('Failed to fetch event');
                const event = await response.json();

                document.getElementById('title').value = event.title;
                // Fill manual and picker fields from existing event date.
                const date = new Date(event.date);
                const formattedDate = new Date(date.getTime() - (date.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
                const [isoDate, time] = formattedDate.split('T');
                eventDatePicker.value = isoDate;
                eventDateText.value = formatDisplayDate(isoDate);
                eventTimePicker.value = time;
                eventTimeText.value = time;
                document.getElementById('date').value = formattedDate;
                
                document.getElementById('location').value = event.location;
                document.getElementById('price').value = event.price;
                document.getElementById('totalTickets').value = event.totalTickets;
                document.getElementById('description').value = event.description;
            } catch (error) {
                console.error(error);
                alert('Error loading event details');
            }
        });

        // Handle Update
        document.getElementById('editEventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('token');
            const isoDate = parseDisplayDate(eventDateText.value.trim());
            const eventTime = parseDisplayTime(eventTimeText.value.trim());

            if (!isoDate || !eventTime) {
                alert('Please enter date as DD-MM-YYYY and time as HH:mm (24-hour format).');
                return;
            }

            document.getElementById('date').value = `${isoDate}T${eventTime}`;
            const formData = new FormData(e.target);

            try {
                const response = await fetch(`${BASE_URL}/events/${eventId}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (!response.ok) throw new Error('Failed to update event');
                
                const modal = document.getElementById('successModal');
                modal.classList.add('active');
                document.getElementById('modalOkBtn').onclick = function() {
                    window.location.href = `event-details.html?id=${eventId}`;
                };
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>
</html>
