<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats - Eventify</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">Eventify</a>
            <nav>
                <ul id="nav-links">
                    <!-- Links will be injected by script -->
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="content-box">
                <h1 id="event-title-heading">Confirm Your Booking</h1>
                <p id="event-subtitle">Loading event details...</p>

                <div class="booking-summary">
                    <p>You are booking <span id="seat-count">0</span> ticket(s) for a total of <span id="total-price">Rs. 0</span></p>
                    <button class="btn btn-primary" id="checkout-btn">Proceed to Payment</button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/nav.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script type="module" src="js/seat-selection.js"></script>
    <script src="js/ui-feedback.js"></script>
</body>
</html>
