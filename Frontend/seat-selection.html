<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats - Eventify</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dummy-payment-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .dummy-payment-card {
            width: min(460px, 92vw);
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }

        .dummy-payment-card h2 {
            margin: 0 0 10px;
        }

        .dummy-payment-card p {
            margin: 0 0 8px;
            color: #444;
        }

        .dummy-payment-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .dummy-status {
            margin-top: 12px;
            font-size: 0.95rem;
            color: #222;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo">Eventify</a>
            <nav>
                <ul id="nav-links">
                    <!-- Links will be injected by script -->
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="content-box">
                <h1 id="event-title-heading">Confirm Your Booking</h1>
                <p id="event-subtitle">Loading event details...</p>

                <div class="booking-summary">
                    <p>You are booking <span id="seat-count">0</span> ticket(s) for a total of <span id="total-price">Rs. 0</span></p>
                    <button class="btn btn-primary" id="checkout-btn">Proceed to Payment</button>
                </div>
            </div>
        </div>
    </main>

    <div id="dummy-payment-modal" class="dummy-payment-modal" aria-hidden="true">
        <div class="dummy-payment-card">
            <h2>Dummy Payment</h2>
            <p id="dummy-payment-event">Event: -</p>
            <p id="dummy-payment-tickets">Tickets: -</p>
            <p id="dummy-payment-amount">Amount: -</p>
            <p id="dummy-payment-id">Payment ID: -</p>
            <div class="dummy-payment-actions">
                <button class="btn btn-primary" id="dummy-success-btn">Pay Success</button>
                <button class="btn btn-danger" id="dummy-failed-btn">Pay Failed</button>
                <button class="btn" id="dummy-cancel-btn">Close</button>
            </div>
            <p class="dummy-status" id="dummy-status-text"></p>
        </div>
    </div>

    <script type="module" src="js/nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const BASE_URL = `${window.location.protocol}//${window.location.hostname}:3000/api`;

            const urlParams = new URLSearchParams(window.location.search);
            const eventId = urlParams.get('eventId');
            const quantity = parseInt(urlParams.get('quantity'), 10) || 1;

            const seatCountEl = document.getElementById('seat-count');
            const totalPriceEl = document.getElementById('total-price');
            const checkoutBtn = document.getElementById('checkout-btn');
            const eventTitleHeading = document.getElementById('event-title-heading');
            const eventSubtitle = document.getElementById('event-subtitle');
            const modal = document.getElementById('dummy-payment-modal');
            const successBtn = document.getElementById('dummy-success-btn');
            const failedBtn = document.getElementById('dummy-failed-btn');
            const closeBtn = document.getElementById('dummy-cancel-btn');
            const statusText = document.getElementById('dummy-status-text');
            const paymentEventText = document.getElementById('dummy-payment-event');
            const paymentTicketsText = document.getElementById('dummy-payment-tickets');
            const paymentAmountText = document.getElementById('dummy-payment-amount');
            const paymentIdText = document.getElementById('dummy-payment-id');

            if (!eventId) {
                eventSubtitle.innerHTML = '<p style="color: red; text-align: center;">No Event ID provided.</p>';
                return;
            }

            let ticketPrice = 0;
            let eventTitle = '';
            let availableTickets = 0;
            let currentPaymentRecord = null;

            try {
                const response = await fetch(`${BASE_URL}/events/${eventId}`);
                if (!response.ok) throw new Error('Failed to fetch event details');
                const event = await response.json();

                ticketPrice = event.price;
                eventTitle = event.title;
                availableTickets = (event.totalTickets || 0) - (event.bookedTickets || 0);

                eventTitleHeading.textContent = `Confirm Booking for ${event.title}`;
                eventSubtitle.innerHTML = `You are booking <strong>${quantity}</strong> ticket(s).<br><span style="font-size: 0.9rem;">${availableTickets} seats remaining.</span>`;

                if (availableTickets < quantity) {
                    checkoutBtn.disabled = true;
                    checkoutBtn.textContent = 'Not Enough Tickets';
                    eventSubtitle.innerHTML += '<br><strong style="color: red;">There are not enough tickets available for this quantity.</strong>';
                } else {
                    updateSummary();
                }

            } catch (error) {
                console.error(error);
                eventSubtitle.textContent = 'Could not load event details.';
                return;
            }

            function updateSummary() {
                seatCountEl.textContent = quantity;
                totalPriceEl.textContent = `Rs. ${quantity * ticketPrice}`;
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = 'Proceed to Payment';
            }

            function setModalVisibility(show) {
                modal.style.display = show ? 'flex' : 'none';
                modal.setAttribute('aria-hidden', show ? 'false' : 'true');
            }

            function setSimulateButtonsDisabled(disabled) {
                successBtn.disabled = disabled;
                failedBtn.disabled = disabled;
                closeBtn.disabled = disabled;
            }

            async function finalizeDummyPayment(outcome) {
                if (!currentPaymentRecord || !currentPaymentRecord.id) return;

                try {
                    setSimulateButtonsDisabled(true);
                    statusText.textContent = `Applying outcome: ${outcome}...`;
                    let successBookingId = null;

                    const token = localStorage.getItem('token');
                    const simulateResponse = await fetch(`${BASE_URL}/payments/${currentPaymentRecord.id}/simulate`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ outcome })
                    });

                    const simulateResult = await simulateResponse.json();
                    if (!simulateResponse.ok) {
                        throw new Error(simulateResult.message || 'Payment simulation failed.');
                    }
                    if (simulateResult && simulateResult.booking && simulateResult.booking._id) {
                        successBookingId = simulateResult.booking._id;
                    }

                    const statusResponse = await fetch(`${BASE_URL}/payments/${currentPaymentRecord.id}`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    const statusResult = await statusResponse.json();
                    if (!statusResponse.ok) {
                        throw new Error(statusResult.message || 'Failed to fetch payment status.');
                    }

                    const latestStatus = statusResult.payment && statusResult.payment.status;
                    if (latestStatus === 'success') {
                        statusText.textContent = 'Payment successful. Redirecting to your ticket QR...';
                        setTimeout(() => {
                            if (successBookingId) {
                                window.location.href = `ticket.html?bookingId=${successBookingId}`;
                            } else {
                                window.location.href = 'ticket.html';
                            }
                        }, 900);
                    } else {
                        statusText.textContent = `Payment ${latestStatus || 'failed'}. Try again if needed.`;
                        checkoutBtn.disabled = false;
                        updateSummary();
                    }
                } catch (error) {
                    statusText.textContent = error.message;
                    checkoutBtn.disabled = false;
                    updateSummary();
                } finally {
                    setSimulateButtonsDisabled(false);
                }
            }

            successBtn.addEventListener('click', () => finalizeDummyPayment('success'));
            failedBtn.addEventListener('click', () => finalizeDummyPayment('failed'));

            function closeModalAndReset() {
                setModalVisibility(false);
                statusText.textContent = '';
                checkoutBtn.disabled = false;
                updateSummary();
            }

            closeBtn.addEventListener('click', closeModalAndReset);

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeModalAndReset();
                }
            });

            checkoutBtn.addEventListener('click', async () => {
                const token = localStorage.getItem('token');
                if (!token) {
                    alert('Please log in to proceed with the booking.');
                    window.location.href = 'login.html';
                    return;
                }

                try {
                    checkoutBtn.disabled = true;
                    checkoutBtn.textContent = 'Starting payment...';

                    const response = await fetch(`${BASE_URL}/payments/create`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            eventId: eventId,
                            tickets: quantity
                        })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        currentPaymentRecord = result.payment;
                        paymentEventText.textContent = `Event: ${eventTitle}`;
                        paymentTicketsText.textContent = `Tickets: ${quantity}`;
                        paymentAmountText.textContent = `Amount: Rs. ${result.payment.amount}`;
                        paymentIdText.textContent = `Payment ID: ${result.payment.paymentId}`;
                        statusText.textContent = 'Choose an outcome to simulate payment.';
                        setModalVisibility(true);
                    } else {
                        throw new Error(result.message || result.error || 'Could not create payment request.');
                    }
                } catch (error) {
                    alert(error.message);
                    checkoutBtn.disabled = false;
                    updateSummary();
                }
            });
        });
    </script>
</body>
</html>
